<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark light" />
    <title>CUCSS - Dashboard</title>
    <link rel="stylesheet" href="styles.css" />

  </head>

  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>cucss</h1>
        <div class="actions">
          <button id="export-button" type="button">Export styles</button>
          <button id="import-button" type="button">Import styles</button>
        </div>
        <div class="hint">Stored rules</div>
        <ul id="stored-styles-list"></ul>
      </aside>

      <main id="content">
          <form id="style-form">
            <div class="header">
              <div>
                <label for="host">Styles for host:</label>
                <span>https://</span>
                <input type="text" id="host" name="host" />
                <span>/*</span>
              </div>
              <button type="submit" id="submit-button" disabled>Save</button>
            </div>

            <div id="code"></div>
          </form>
      </main>
    </div>

    <script src="dashboard.js" type="module"></script>
  </body>
</html>
